<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0d0d0d;
    --surface: #222222;
    --border: #333333;
    --accent: #c8f135;
    --accent-dim: #9ab82a;
    --text: #ffffff;
    --muted: #bbbbbb;
    --danger: #ff4d4d;
    --warn: #ffaa00;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .panel {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    display: none;
    flex-direction: column;
  }

  .panel.active { display: flex; }

  header {
    width: 100%;
    padding: 56px 24px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mode-pill {
    display: flex;
    background: var(--surface);
    border-radius: 20px;
    padding: 4px;
    gap: 4px;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 6px 16px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 17px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #0d0d0d;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    margin-left: auto;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.live { background: var(--accent); animation: pulse 1.4s infinite; }
  .status-dot.paused { background: var(--warn); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .main {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 24px 0;
    gap: 20px;
  }

  .speed-ring {
    width: 160px; height: 160px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .speed-ring svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 427;
    stroke-dashoffset: 427;
    transition: stroke-dashoffset 0.6s ease;
  }

  .speed-val {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -3px;
    line-height: 1;
    color: var(--text);
    z-index: 1;
  }

  .speed-unit {
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    z-index: 1;
    margin-top: 4px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 11px 14px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .stat-label {
    font-size: 15px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-val {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -1px;
    line-height: 1.05;
  }

  .stat-sub {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.2;
  }

  .stat-card.highlight {
    border-color: var(--accent);
  }

  .stat-card.highlight .stat-val {
    color: var(--accent);
  }

  .notice {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 14px;
    font-size: 17px;
    line-height: 1.5;
  }

  .notice.error {
    border-color: var(--danger);
    color: var(--danger);
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 18px 20px;
    width: 100%;
    display: none;
    flex-direction: column;
    gap: 10px;
  }

  .summary-card.visible { display: flex; }

  .summary-title {
    font-size: 17px;
  }

  .summary-dist {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -3px;
    color: var(--accent);
    line-height: 1;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    gap: 16px;
  }

  .summary-item { flex: 1; }
  .summary-item-label { font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .summary-item-val { font-size: 22px; font-weight: 600; margin-top: 2px; }

  .controls {
    width: 100%;
    padding: 24px;
    display: flex;
    gap: 12px;
  }

  .btn {
    flex: 1;
    height: 60px;
    border-radius: 16px;
    border: none;
    font-size: 23px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.96); }

  .btn-start {
    background: var(--accent);
    color: #0d0d0d;
  }

  .btn-pause {
    background: var(--surface);
    color: var(--warn);
    border: 1px solid var(--warn);
    display: none;
  }

  .btn-stop {
    background: var(--surface);
    color: var(--danger);
    border: 1px solid var(--danger);
    display: none;
    flex: 0 0 60px;
    width: 60px;
  }

  .btn-save {
    background: var(--accent);
    color: #0d0d0d;
    display: none;
  }

  .btn-discard {
    background: var(--surface);
    color: var(--danger);
    border: 1px solid var(--danger);
    display: none;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Tab bar ── */
  .tab-bar {
    width: 100%;
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .tab-btn {
    flex: 1;
    padding: 12px 0 10px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }

  .tab-btn.active { color: var(--accent); }

  .tab-icon { font-size: 22px; line-height: 1; }

  /* ── History panel ── */
  .history-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cal-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .cal-nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .cal-nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 18px;
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .cal-month-label {
    font-size: 17px;
    font-weight: 600;
    width: 130px;
    text-align: center;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-dow {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: var(--text);
    background: transparent;
    position: relative;
    gap: 1px;
  }

  .cal-day.empty { }

  .cal-day.has-workout {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .cal-day.has-run { border-color: var(--accent); }
  .cal-day.has-bike { border-color: #38bdf8; }
  .cal-day.has-both { border-color: var(--warn); }
  .cal-day.selected { outline: 2px solid white; outline-offset: 1px; }

  .cal-day-num { font-size: 15px; font-weight: 500; line-height: 1; }
  .today-num {
    background: var(--border);
    border-radius: 50%;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }

  .cal-legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .cal-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  .cal-legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  /* ── Monthly summary bar ── */
  .cal-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .cal-sum-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cal-sum-card.run-card  { border-color: var(--accent); }
  .cal-sum-card.bike-card { border-color: #38bdf8; }

  .cal-sum-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .cal-sum-miles {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }

  .cal-sum-card.run-card  .cal-sum-miles { color: var(--accent); }
  .cal-sum-card.bike-card .cal-sum-miles { color: #38bdf8; }

  .cal-sum-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Day detail panel ── */
  .cal-detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }

  .cal-detail.visible { display: flex; }

  .cal-detail-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .cal-detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
  }

  .cal-detail-type { color: var(--muted); }
  .cal-detail-val  { font-weight: 600; font-size: 18px; }

  .history-empty {
    color: var(--muted);
    font-size: 16px;
    text-align: center;
    margin-top: 60px;
  }
</style>
</head>
<body>

<header>
  <div class="mode-pill">
    <button class="mode-btn active" data-mode="run" onclick="setMode('run')">Run</button>
    <button class="mode-btn" data-mode="bike" onclick="setMode('bike')">Bike</button>
  </div>
  <div class="status-dot" id="statusDot"></div>
</header>

<!-- TRACK PANEL -->
<div class="panel active" id="panelTrack">
  <div class="main">

    <div class="speed-ring">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring-track" cx="80" cy="80" r="68"/>
        <circle class="ring-fill" id="ringFill" cx="80" cy="80" r="68"/>
      </svg>
      <div class="speed-val" id="speedVal">0.0</div>
      <div class="speed-unit" id="speedUnit">mph</div>
    </div>

    <div class="stats-row">
      <div class="stat-card" id="distCard">
        <div class="stat-label">Distance</div>
        <div class="stat-val" id="distVal">0.00</div>
        <div class="stat-sub" id="distUnit">miles</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Time</div>
        <div class="stat-val" id="timeVal">0:00</div>
        <div class="stat-sub">elapsed</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Speed</div>
        <div class="stat-val" id="avgVal">0.0</div>
        <div class="stat-sub" id="avgUnit">mph</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Speed</div>
        <div class="stat-val" id="topVal">0.0</div>
        <div class="stat-sub" id="topUnit">mph</div>
      </div>
    </div>

    <div class="notice" id="notice" style="display:none"></div>

    <div class="summary-card" id="summaryCard">
      <div class="summary-title" id="sumTitle">Workout complete</div>
      <div class="summary-dist" id="sumDist">0.00 mi</div>
      <div class="summary-row">
        <div class="summary-item">
          <div class="summary-item-label">Time</div>
          <div class="summary-item-val" id="sumTime">—</div>
        </div>
        <div class="summary-item">
          <div class="summary-item-label">Avg speed</div>
          <div class="summary-item-val" id="sumAvg">—</div>
        </div>
        <div class="summary-item">
          <div class="summary-item-label">Top speed</div>
          <div class="summary-item-val" id="sumTop">—</div>
        </div>
      </div>
    </div>

  </div>

  <div class="controls">
    <button class="btn btn-start"   id="btnStart"   onclick="startTracking()">Start</button>
    <button class="btn btn-pause"   id="btnPause"   onclick="togglePause()">Pause</button>
    <button class="btn btn-stop"    id="btnStop"    onclick="stopTracking()">■</button>
    <button class="btn btn-save"    id="btnSave"    onclick="saveWorkout()">Save</button>
    <button class="btn btn-discard" id="btnDiscard" onclick="resetTracking()">Discard</button>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="panel" id="panelHistory">
  <div class="history-panel" id="historyPanel"></div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tabTrack" onclick="switchTab('track')">
    <span class="tab-icon">🏃</span>Track
  </button>
  <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">
    <span class="tab-icon">📋</span>History
  </button>
</div>

<script>
  let watchId = null;
  let state = 'idle'; // idle | running | paused | stopped
  let mode = 'run';
  let wakeLock = null;

  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (e) {}
  }

  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && state === 'running') acquireWakeLock();
  });

  let totalDist = 0;
  let lastPos = null;
  let startTime = null;
  let elapsed = 0;
  let timerInterval = null;
  let pauseStart = null;
  let totalPaused = 0;

  let currentSpeed = 0;
  let topSpeed = 0;
  let speedReadings = [];

  const MAX_SPEED = { run: 20, bike: 50 }; // mph — ring scale

  function setMode(m) {
    if (state !== 'idle') return;
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    updateUnits();
  }

  function updateUnits() {
    const u = 'mph';
    ['speedUnit','avgUnit','topUnit'].forEach(id => document.getElementById(id).textContent = u);
    document.getElementById('distUnit').textContent = 'miles';
  }

  function toMph(mps) { return mps * 2.23694; }
  function toMiles(m) { return m * 0.000621371; }

  function haversine(a, b) {
    const R = 6371000;
    const φ1 = a.lat * Math.PI/180, φ2 = b.lat * Math.PI/180;
    const Δφ = (b.lat - a.lat) * Math.PI/180;
    const Δλ = (b.lon - a.lon) * Math.PI/180;
    const s = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
  }

  function fmtTime(ms) {
    const s = Math.floor(ms/1000);
    const m = Math.floor(s/60);
    const h = Math.floor(m/60);
    if (h > 0) return `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    return `${m}:${String(s%60).padStart(2,'0')}`;
  }

  function setNotice(msg, type='') {
    const el = document.getElementById('notice');
    el.textContent = msg;
    el.className = 'notice' + (type ? ' ' + type : '');
    el.style.display = msg ? '' : 'none';
  }

  function updateRing(speedMph) {
    const max = MAX_SPEED[mode];
    const pct = Math.min(speedMph / max, 1);
    const circ = 427;
    document.getElementById('ringFill').style.strokeDashoffset = circ * (1 - pct);
  }

  function updateDisplay() {
    document.getElementById('speedVal').textContent = currentSpeed.toFixed(1);
    document.getElementById('distVal').textContent = toMiles(totalDist).toFixed(2);
    document.getElementById('topVal').textContent = topSpeed.toFixed(1);
    updateRing(currentSpeed);

    const now = Date.now();
    const activeMs = (startTime ? (now - startTime - totalPaused) : 0);
    document.getElementById('timeVal').textContent = fmtTime(Math.max(0, activeMs));

    const hrs = activeMs / 3600000;
    const avg = hrs > 0 ? toMiles(totalDist) / hrs : 0;
    document.getElementById('avgVal').textContent = avg.toFixed(1);
  }

  function onPosition(pos) {
    if (state !== 'running') return;

    const curr = { lat: pos.coords.latitude, lon: pos.coords.longitude };
    const rawSpeedMps = pos.coords.speed;

    if (rawSpeedMps !== null && rawSpeedMps >= 0) {
      const mph = toMph(rawSpeedMps);
      speedReadings.push(mph);
      if (speedReadings.length > 5) speedReadings.shift();
      currentSpeed = speedReadings.reduce((a,b) => a+b, 0) / speedReadings.length;
      if (currentSpeed > topSpeed) topSpeed = currentSpeed;
    }

    if (lastPos) {
      const d = haversine(lastPos, curr);
      if (d < 200) totalDist += d;
    }
    lastPos = curr;

    setNotice('', '');
    updateDisplay();
  }

  function onError(err) {
    const msgs = {
      1: 'Location access denied. Please enable in Settings > Privacy > Location.',
      2: 'Location unavailable. Try stepping outside.',
      3: 'GPS timed out. Retrying…'
    };
    setNotice(msgs[err.code] || 'GPS error.', 'error');
  }

  function startTracking() {
    if (!navigator.geolocation) {
      setNotice('Geolocation not supported in this browser.', 'error');
      return;
    }

    state = 'running';
    startTime = Date.now();
    totalPaused = 0;

    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnPause').style.display = 'block';
    document.getElementById('btnStop').style.display = 'block';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnDiscard').style.display = 'none';
    document.getElementById('summaryCard').classList.remove('visible');
    document.querySelector('.stats-row').style.display = 'grid';
    document.getElementById('statusDot').className = 'status-dot live';

    acquireWakeLock();
    setNotice('Acquiring GPS signal…');

    timerInterval = setInterval(updateDisplay, 1000);

    watchId = navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    });
  }

  function togglePause() {
    if (state === 'running') {
      state = 'paused';
      pauseStart = Date.now();
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      clearInterval(timerInterval);
      releaseWakeLock();
      document.getElementById('btnPause').textContent = 'Resume';
      document.getElementById('btnPause').style.color = 'var(--accent)';
      document.getElementById('btnPause').style.borderColor = 'var(--accent)';
      document.getElementById('statusDot').className = 'status-dot paused';
      currentSpeed = 0;
      updateDisplay();
      setNotice('Paused — GPS off to save battery');
    } else if (state === 'paused') {
      state = 'running';
      totalPaused += Date.now() - pauseStart;
      pauseStart = null;
      acquireWakeLock();
      document.getElementById('btnPause').textContent = 'Pause';
      document.getElementById('btnPause').style.color = 'var(--warn)';
      document.getElementById('btnPause').style.borderColor = 'var(--warn)';
      document.getElementById('statusDot').className = 'status-dot live';
      setNotice('Resuming…');
      timerInterval = setInterval(updateDisplay, 1000);
      watchId = navigator.geolocation.watchPosition(onPosition, onError, {
        enableHighAccuracy: true, maximumAge: 0, timeout: 10000
      });
    }
  }

  let pendingWorkout = null;

  function stopTracking() {
    state = 'stopped';
    releaseWakeLock();
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    clearInterval(timerInterval);

    const activeMs = startTime ? (Date.now() - startTime - totalPaused) : 0;
    const miles = toMiles(totalDist);
    const hrs = activeMs / 3600000;
    const avg = hrs > 0 ? miles / hrs : 0;

    pendingWorkout = {
      id: Date.now(),
      date: new Date().toISOString(),
      mode,
      miles: parseFloat(miles.toFixed(2)),
      durationMs: activeMs,
      avgMph: parseFloat(avg.toFixed(1)),
      topMph: parseFloat(topSpeed.toFixed(1))
    };

    document.getElementById('sumTitle').textContent = 'Save this workout?';
    document.getElementById('sumDist').textContent = miles.toFixed(2) + ' mi';
    document.getElementById('sumTime').textContent = fmtTime(activeMs);
    document.getElementById('sumAvg').textContent = avg.toFixed(1) + ' mph';
    document.getElementById('sumTop').textContent = topSpeed.toFixed(1) + ' mph';
    document.getElementById('summaryCard').classList.add('visible');

    document.getElementById('btnPause').style.display = 'none';
    document.getElementById('btnStop').style.display = 'none';
    document.getElementById('btnSave').style.display = 'block';
    document.getElementById('btnDiscard').style.display = 'block';
    document.querySelector('.stats-row').style.display = 'none';
    document.getElementById('statusDot').className = 'status-dot';
    setNotice('');
    updateRing(0);
    document.getElementById('speedVal').textContent = '—';
  }

  function saveWorkout() {
    if (!pendingWorkout) return;
    const history = JSON.parse(localStorage.getItem('tracker_history') || '[]');
    history.unshift(pendingWorkout);
    localStorage.setItem('tracker_history', JSON.stringify(history));
    pendingWorkout = null;
    resetTracking();
    switchTab('history');
  }

  function resetTracking() {
    pendingWorkout = null;
    state = 'idle';
    totalDist = 0; lastPos = null; startTime = null;
    elapsed = 0; pauseStart = null; totalPaused = 0;
    currentSpeed = 0; topSpeed = 0; speedReadings = [];

    document.getElementById('speedVal').textContent = '0.0';
    document.getElementById('distVal').textContent = '0.00';
    document.getElementById('timeVal').textContent = '0:00';
    document.getElementById('avgVal').textContent = '0.0';
    document.getElementById('topVal').textContent = '0.0';
    updateRing(0);

    document.getElementById('btnStart').style.display = 'block';
    document.getElementById('btnPause').style.display = 'none';
    document.getElementById('btnStop').style.display = 'none';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnDiscard').style.display = 'none';
    document.getElementById('summaryCard').classList.remove('visible');
    document.querySelector('.stats-row').style.display = 'grid';
    document.getElementById('statusDot').className = 'status-dot';
    setNotice('');
  }

  function switchTab(tab) {
    document.getElementById('panelTrack').classList.toggle('active', tab === 'track');
    document.getElementById('panelHistory').classList.toggle('active', tab === 'history');
    document.getElementById('tabTrack').classList.toggle('active', tab === 'track');
    document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
    if (tab === 'history') loadHistory();
  }

  let selectedDayKey = null;

  function loadHistory() {
    const history = JSON.parse(localStorage.getItem('tracker_history') || '[]');
    const panel = document.getElementById('historyPanel');

    // Build day map
    const dayMap = {};
    history.forEach(w => {
      const d = new Date(w.date);
      const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      if (!dayMap[key]) dayMap[key] = { run: 0, bike: 0 };
      dayMap[key][w.mode] += w.miles;
    });

    // Monthly totals
    const monthRunMiles  = history.filter(w => { const d = new Date(w.date); return d.getFullYear() === calYear && d.getMonth() === calMonth && w.mode === 'run'; }).reduce((s,w) => s + w.miles, 0);
    const monthBikeMiles = history.filter(w => { const d = new Date(w.date); return d.getFullYear() === calYear && d.getMonth() === calMonth && w.mode === 'bike'; }).reduce((s,w) => s + w.miles, 0);
    const monthRunCount  = new Set(history.filter(w => { const d = new Date(w.date); return d.getFullYear() === calYear && d.getMonth() === calMonth && w.mode === 'run'; }).map(w => { const d = new Date(w.date); return `${d.getDate()}`; })).size;
    const monthBikeCount = new Set(history.filter(w => { const d = new Date(w.date); return d.getFullYear() === calYear && d.getMonth() === calMonth && w.mode === 'bike'; }).map(w => { const d = new Date(w.date); return `${d.getDate()}`; })).size;

    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const dows = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const today = new Date();
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

    const dowHtml = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

    let cellsHtml = Array(firstDay).fill('<div class="cal-day empty"></div>').join('');

    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${calYear}-${calMonth}-${d}`;
      const w = dayMap[key];
      const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
      const isSelected = key === selectedDayKey;

      let cls = 'cal-day';
      let icon = '';

      if (w) {
        const hasRun  = w.run  > 0;
        const hasBike = w.bike > 0;
        cls += ' has-workout';
        if (hasRun && hasBike) { cls += ' has-both';  icon = '🏃🚴'; }
        else if (hasRun)       { cls += ' has-run';   icon = '🏃'; }
        else if (hasBike)      { cls += ' has-bike';  icon = '🚴'; }
        if (isSelected) cls += ' selected';
        cellsHtml += `
          <div class="${cls}" onclick="selectDay('${key}')">
            <div class="cal-day-num${isToday ? ' today-num' : ''}">${d}</div>
            <div class="cal-day-icon">${icon}</div>
          </div>`;
      } else {
        if (isToday) cls += ' today';
        cellsHtml += `<div class="${cls}"><div class="cal-day-num${isToday ? ' today-num' : ''}">${d}</div></div>`;
      }
    }

    // Day detail HTML
    let detailHtml = '';
    if (selectedDayKey && dayMap[selectedDayKey]) {
      const w = dayMap[selectedDayKey];
      const [y, m, d] = selectedDayKey.split('-');
      const dateLabel = new Date(+y, +m, +d).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
      detailHtml = `
        <div class="cal-detail visible" id="calDetail">
          <div class="cal-detail-title">${dateLabel}</div>
          ${w.run  > 0 ? `<div class="cal-detail-row"><span class="cal-detail-type">🏃 Run</span> <span class="cal-detail-val" style="color:var(--accent)">${w.run.toFixed(2)} mi</span></div>` : ''}
          ${w.bike > 0 ? `<div class="cal-detail-row"><span class="cal-detail-type">🚴 Bike</span><span class="cal-detail-val" style="color:#38bdf8">${w.bike.toFixed(2)} mi</span></div>` : ''}
        </div>`;
    }

    const hasAny = history.length > 0;

    panel.innerHTML = `
      <div class="cal-header">
        <span class="cal-title">History</span>
        ${hasAny ? `<button style="font-size:13px;color:var(--danger);background:none;border:none;cursor:pointer;" onclick="clearHistory()">Clear all</button>` : ''}
      </div>

      <div class="cal-summary">
        <div class="cal-sum-card run-card">
          <div class="cal-sum-label">🏃 Run</div>
          <div class="cal-sum-miles">${monthRunMiles.toFixed(1)}</div>
          <div class="cal-sum-sub">miles · ${monthRunCount} session${monthRunCount !== 1 ? 's' : ''}</div>
        </div>
        <div class="cal-sum-card bike-card">
          <div class="cal-sum-label">🚴 Bike</div>
          <div class="cal-sum-miles">${monthBikeMiles.toFixed(1)}</div>
          <div class="cal-sum-sub">miles · ${monthBikeCount} session${monthBikeCount !== 1 ? 's' : ''}</div>
        </div>
      </div>

      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calShift(-1)">‹</button>
        <div class="cal-month-label">${months[calMonth]} ${calYear}</div>
        <button class="cal-nav-btn" onclick="calShift(1)">›</button>
      </div>
      <div class="cal-grid">
        ${dowHtml}
        ${cellsHtml}
      </div>

      ${detailHtml}

      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--accent)"></div>Run</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#38bdf8"></div>Bike</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--warn)"></div>Both</div>
      </div>
      ${!hasAny ? '<div style="color:var(--muted);font-size:16px;text-align:center;margin-top:40px;">No workouts saved yet.</div>' : ''}
    `;
  }

  function selectDay(key) {
    selectedDayKey = selectedDayKey === key ? null : key; // tap again to deselect
    loadHistory();
  }

  function calShift(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0;  calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    selectedDayKey = null;
    loadHistory();
  }

  function clearHistory() {
    localStorage.removeItem('tracker_history');
    selectedDayKey = null;
    loadHistory();
  }

  updateUnits();
  loadHistory();
</script>
</body>
</html>
